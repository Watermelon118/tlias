# ============================================
# CI/CD 工作流 - 编译 + 构建镜像 + 推送 + 部署
# ============================================

name: CI/CD

on:
  push:
    branches: [ main ]

jobs:

  # ========== 任务1：编译后端（和之前一样）==========
  build-backend:
    name: 编译后端项目
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Maven 编译打包
        run: mvn clean package -DskipTests
        working-directory: tlias-web-management

      - name: 上传 jar 包
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: tlias-web-management/target/tlias.jar

  # ========== 任务2：构建前端（和之前一样）==========
  build-frontend:
    name: 构建前端项目
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装依赖
        run: npm install
        working-directory: vue-tlias-management

      - name: 构建生产包
        run: npm run build
        working-directory: vue-tlias-management

      - name: 上传前端产物
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: vue-tlias-management/dist/

  # ========== 任务3：构建 Docker 镜像 + 推送到 Docker Hub ==========
  docker-push:
    name: 构建并推送镜像
    runs-on: ubuntu-latest
    needs: [ build-backend, build-frontend ]

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 下载后端 jar 包
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: tlias-web-management/target/

      - name: 下载前端产物
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: vue-tlias-management/dist/

      # 登录 Docker Hub（用你存在 Secrets 里的账号密码）
      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 构建并推送后端镜像
      - name: 构建并推送后端镜像
        run: |
          docker build -t deto2y14/tlias-server:latest .
          docker push deto2y14/tlias-server:latest
        working-directory: tlias-web-management

      # 构建并推送前端镜像
      - name: 构建并推送前端镜像
        run: |
          docker build -t deto2y14/tlias-nginx:latest .
          docker push deto2y14/tlias-nginx:latest
        working-directory: vue-tlias-management

  # ========== 任务4：部署到服务器 ==========
  deploy:
    name: 部署到服务器
    runs-on: ubuntu-latest
    needs: docker-push              # 等镜像推送完成后再部署

    steps:
      # 用 SSH 连接你的服务器，执行部署命令
      - name: SSH 远程部署
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}

          # 下面就是在你服务器上执行的命令，和你自己 SSH 进去敲命令一样
          script: |
            # 创建项目目录
            mkdir -p /opt/tlias

            # 写入 docker-compose.yml
            cat > /opt/tlias/docker-compose.yml << 'EOF'
            services:
              mysql:
                image: mysql:8
                container_name: mysql
                ports:
                  - "3306:3306"
                environment:
                  TZ: Asia/Shanghai
                  MYSQL_ROOT_PASSWORD: "123456"
                volumes:
                  - "./db/init:/docker-entrypoint-initdb.d"
                  - "mysql-data:/var/lib/mysql"
                networks:
                  - tlias-net

              tlias-server:
                image: deto2y14/tlias-server:latest
                container_name: tlias-server
                ports:
                  - "8080:8080"
                environment:
                  OSS_ACCESS_KEY_ID: $OSS_ACCESS_KEY_ID
                  OSS_ACCESS_KEY_SECRET: $OSS_ACCESS_KEY_SECRET
                depends_on:
                  - mysql
                networks:
                  - tlias-net

              tlias-nginx:
                image: deto2y14/tlias-nginx:latest
                container_name: tlias-nginx
                ports:
                  - "80:80"
                depends_on:
                  - tlias-server
                networks:
                  - tlias-net

            networks:
              tlias-net:
                name: tlias-net

            volumes:
              mysql-data:
            EOF

            # 创建数据库初始化目录并下载 SQL 文件
            mkdir -p /opt/tlias/db/init
            curl -o /opt/tlias/db/init/tlias.sql https://raw.githubusercontent.com/Watermelon118/tlias/main/db/init/tlias.sql

            # 进入项目目录
            cd /opt/tlias

            # 设置环境变量（从 GitHub Secrets 传入）
            export OSS_ACCESS_KEY_ID="${{ secrets.OSS_ACCESS_KEY_ID }}"
            export OSS_ACCESS_KEY_SECRET="${{ secrets.OSS_ACCESS_KEY_SECRET }}"

            # 拉取最新镜像
            docker compose pull

            # 停止旧容器并启动新容器（-d 后台运行）
            docker compose up -d

            # 清理旧的无用镜像
            docker image prune -f
