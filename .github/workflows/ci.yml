# ============================================
# CI 工作流 - 后端编译 + 前端构建（并行执行）
# ============================================

name: CI                             # 工作流名字

# ---- 触发条件 ----
on:
  push:
    branches: [ main ]

# ---- 要执行的任务 ----
# 两个 Job 没有依赖关系，GitHub 会同时启动两台服务器并行跑
jobs:

  # ========== 任务1：编译后端 ==========
  build-backend:
    name: 编译后端项目
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Maven 编译打包
        run: mvn clean package -DskipTests
        working-directory: tlias-web-management

  # ========== 任务2：构建前端 ==========
  build-frontend:
    name: 构建前端项目
    runs-on: ubuntu-latest            # 另一台独立的服务器

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js 18
        uses: actions/setup-node@v4   # 和 setup-java 类似，官方提供的 Node 安装动作
        with:
          node-version: '18'

      - name: 安装依赖
        run: npm install              # 相当于你本地的 npm install
        working-directory: vue-tlias-management

      - name: 构建生产包
        run: npm run build            # 相当于你本地的 npm run build，生成 dist/
        working-directory: vue-tlias-management
