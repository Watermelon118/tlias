server {
    listen 80;
    server_name localhost;

    # 前端静态资源
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;  # Vue 路由的 history 模式需要这行
    }

    # 反向代理：把 /api 请求转发到后端容器，去掉 /api 前缀
    # 前端请求 /api/login → Nginx 转发给后端 /login
    location /api/ {
        proxy_pass http://tlias-server:8080/;
    }
}
