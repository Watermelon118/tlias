services:
  # ---- MySQL ----
  mysql:
    image: mysql:8
    container_name: mysql
    ports:
      - "3306:3306"
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: "123456"
    volumes:
      - "./db/init:/docker-entrypoint-initdb.d"    # 首次启动时自动执行 SQL 文件
      - "mysql-data:/var/lib/mysql"                 # 数据持久化
    networks:
      - tlias-net

  # ---- 后端 ----
  tlias-server:
    image: deto2y14/tlias-server:latest
    container_name: tlias-server
    ports:
      - "8080:8080"
    environment:
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID}           # 从环境变量读取，不写死
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET}    # 从环境变量读取，不写死
    depends_on:
      - mysql
    networks:
      - tlias-net

  # ---- 前端 (Nginx) ----
  tlias-nginx:
    image: deto2y14/tlias-nginx:latest
    container_name: tlias-nginx
    ports:
      - "80:80"
    depends_on:
      - tlias-server
    networks:
      - tlias-net

networks:
  tlias-net:
    name: tlias-net

volumes:
  mysql-data:
